<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <nav id="navbar">
        <div class="container">
            <div class="nav-content">
                <span class="logo">smart tasks</span>
                <button id="loginBtn" class="btn btn-success">login</button>
            </div>
        </div>
    </nav>
    <header id="header">
        <div class="container">

        </div>
