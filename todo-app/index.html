<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <nav id="navbar">
        <div class="container">
            <div class="nav-content">
                <span class="logo">smart tasks</span>
                <button id="loginBtn" class="btn btn-success">login</button>
            </div>
        </div>
    </nav>
    <header id="header">
        <div class="container">
            <div class="header-content">
                <h1>smart task manager</h1>
                <p class="heero-tagline">Stay organized. Stay focused.</p>
                <div class="hero-tasks-stats">
                    <div class="hero-tasks-stat" data-task-stat="total"></div>
                    <div class="hero-tasks-stat" data-task-stat="completed"></div>
                    <div class="hero-tasks-stat" data-task-stat="remaining"></div>
                    <div class="hero-tasks-stat" data-task-stat="progress"></div>
                </div>
            </div>
        </div>
    </header>
    <section id="tasksManatement">
        <div class="container">
            <div class="tasks-management-content">
                Add Task
                [ Task title        ]
                [ Category dropdown ]
                [ Priority dropdown ]
                [ Deadline date     ]
                [ Add Task ]
                <div class="progress-bar" data-task-progress=""></div>
            </div>
        </div>
    </section>
    <script src="./index.js"></script>
</body>
</html>
